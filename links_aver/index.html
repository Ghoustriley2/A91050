<body>

<div class="bg"></div>

<header class="topbar">

            INDUSTRIAL ERROR

        <div class="brand-sub">

<main class="container">

    <section class="locked">

        <div class="status">ACCESS DENIED</div>

        <h1>MODULE LOCKED</h1>

        <div class="hint">

            Доступ ограничен системой.
